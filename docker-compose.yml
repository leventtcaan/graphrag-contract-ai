version: "3.9"

# Bu dosyada projenin geliştirme ortamı altyapısını tanımladım.
# İki servis var: PostgreSQL (ilişkisel veriler) ve Neo4j (grafik veritabanı).
# Her iki servis de kalıcı veri depolama için named volume kullanıyor.

services:

  # ─── İlişkisel Veritabanı ───────────────────────────────────────────────────
  # Kullanıcı yönetimi, tenant bilgileri, sözleşme metadata'sı ve audit loglar
  # için PostgreSQL'i tercih ettim. Olgunluğu ve SQLAlchemy ile mükemmel entegrasyonu
  # bu seçimi kolaylaştırdı.
  postgres:
    image: postgres:16-alpine
    container_name: itlaw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-itlaw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itlaw_secret}
      POSTGRES_DB: ${POSTGRES_DB:-itlaw_db}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itlaw_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itlaw_user} -d ${POSTGRES_DB:-itlaw_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Grafik Veritabanı ──────────────────────────────────────────────────────
  # GraphRAG mimarisinin kalbi burası. Sözleşmeler arası ilişkiler, madde bağlantıları
  # ve compliance gereksinimleri arasındaki karmaşık ilişkileri graph yapısında tutmak
  # için Neo4j'yi seçtim. APOC plugin'i gelişmiş grafik algoritmalarını kullanabilmem
  # için şimdiden aktif ettim.
  neo4j:
    image: neo4j:5.18-community
    container_name: itlaw_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/itlaw_neo4j_secret}
      # APOC plugin'ini aktif ediyorum — GraphRAG sorgularında çok işime yarayacak
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      # Bellek ayarlarını geliştirme ortamına uygun tutuyorum; prod'da artırırım
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
      NEO4J_dbms_memory_pagecache_size: "512m"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Neo4j Browser (Web UI)
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protokolü (uygulama bağlantısı)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks:
      - itlaw_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

# ─── Kalıcı Veri Hacimleri ────────────────────────────────────────────────────
# Container'ları yeniden başlatırken veya yeniden oluştururken veri kaybı yaşamamak
# için named volume'lar tanımladım.
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local

# ─── Ağ Yapılandırması ────────────────────────────────────────────────────────
# Servisler arasındaki iletişimi izole bir bridge network üzerinden sağlıyorum.
# İleride FastAPI container'ı da bu ağa dahil edeceğim.
networks:
  itlaw_network:
    driver: bridge

api:
    build: .
    container_name: itlaw_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=itlaw_neo4j_secret
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=itlaw_user
      - POSTGRES_PASSWORD=itlaw_secret
      - POSTGRES_DB=itlaw_db
    networks:
      - itlaw_network

  frontend:
    build: ./frontend
    container_name: itlaw_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - itlaw_network